<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Hopper Frog</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main id="game">

        <!-- ゲーム画面 -->
        <section id="world">

            <!-- 背景画像 -->
            <img id="background" src="back.png" alt="背景">

            <!-- スコア -->
            <div id="score">
                0000
            </div>

            <!-- プレイヤー -->
            <img id="player" src="frog1.png" alt="プレイヤー">

            <!-- 障害物を追加する場所 -->
            <div id="obstacles"></div>

            <!-- スタートメッセージ -->
            <div id="startScreen">

    <img
        id="logo"
        src="logo.png"
        alt="Logo"
    >

    <img
        id="tapToStart"
        src="taptostart.png"
        alt="Tap To Start"
    >

</div>

            <!-- ゲームオーバー画面（最初は非表示） -->
            <div id="gameOver">

                <h1>GAME OVER</h1>

                <p id="finalScore"></p>

                <button id="retryButton">
                    RETRY
                </button>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
